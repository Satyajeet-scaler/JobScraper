# https://docs.railway.com/deploy/config-as-code
#
# Set variables in the Railway dashboard (or linked env group):
#   INTERNAL_TRIGGER_TOKEN     — required for POST /internal/* (daily jobs, linkedin login, etc.)
#   LINKEDIN_EMAIL             — for /internal/linkedin-auto-login
#   LINKEDIN_PASSWORD
#   LINKEDIN_HEADLESS          — use true on Railway (no display). POST local linkedin_storage.json to /internal/linkedin-session.
# Optional: LINKEDIN_STORAGE_PATH=/app/data/linkedin_storage.json with a volume so sessions survive redeploys
# Local manual login: set LINKEDIN_SESSION_UPLOAD_URL=https://<app>/internal/linkedin-session + INTERNAL_TRIGGER_TOKEN to auto-upload from linkedin_manual_login.py
# Optional: LINKEDIN_RECRUITER_SHEET_ENABLED=true — after classification, scrape LinkedIn recruiters into tab recruiters_info_{date} (or RECRUITERS_INFO_WORKSHEET)
# Optional: LINKEDIN_RECRUITER_MAX_URLS_PER_RUN=0 (0 = no cap; set e.g. 60 to limit per run)
# Optional: LINKEDIN_RECRUITER_FORCE_FAIL_TIMEOUT_S=15
# Optional: LINKEDIN_RECRUITER_RECYCLE_EVERY=25
# Optional: LINKEDIN_RECRUITER_RETRY_COUNT=3
# Optional: LINKEDIN_RECRUITER_RETRY_BASE_DELAY_S=1
# Optional: LINKEDIN_RECRUITER_LAUNCH_RETRY_COUNT=1 (retry whole recruiter scrape on Chromium launch crash)
# Optional: LINKEDIN_RECRUITER_LAUNCH_RETRY_DELAY_S=3
# Optional: LINKEDIN_POSTS_PIPELINE_ENABLED=true — run LinkedIn-posts Apify pipeline in parallel with /internal/run-daily-jobs
# Optional: APIFY_LINKEDIN_POSTS_ACTOR_ID=buIWk2uOUzTmcLsuB
# Optional: APIFY_LINKEDIN_POST_QUERIES='["hiring data analyst Bangalore","hiring backend developer India"]'
# Optional: APIFY_LINKEDIN_POSTS_MAX_POSTS=30, APIFY_LINKEDIN_POSTS_POSTED_LIMIT=24h, APIFY_LINKEDIN_POSTS_SORT_BY=date
# Optional: AI_RELEVANCE_PROMPT_LINKEDIN_POSTS="..."
# Optional: COMPANY_CONTACTS_SHEET_NAME=company_contacts  (tab inside GOOGLE_SPREADSHEET_ID)
# Optional: COMPANY_CONTACTS_COMPANY_COLUMN=Name of company
# Optional: COMPANY_CONTACTS_EMAIL_COLUMN=Email Address
# Optional: OWNER_SHEET_NAME=owner_slack_ID
# Optional: LINKEDIN_POSTS_OWNER_HANDOVER=true — LinkedIn post Slack uses same owner round-robin + grouped blocks as job handover
# These contacts are used as fallback recruiter_email rows in recruiters_info_{date}
# Optional: APP_LOG_LEVEL, Google/Slack keys used by services/pipeline.py, etc.
#
[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
