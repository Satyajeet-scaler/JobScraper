# https://docs.railway.com/deploy/config-as-code
#
# Set variables in the Railway dashboard (or linked env group):
#   INTERNAL_TRIGGER_TOKEN     — required for POST /internal/* (daily jobs, linkedin login, etc.)
#   LINKEDIN_EMAIL             — for /internal/linkedin-auto-login
#   LINKEDIN_PASSWORD
#   LINKEDIN_HEADLESS          — use true on Railway (no display). POST local linkedin_storage.json to /internal/linkedin-session.
# Optional: LINKEDIN_STORAGE_PATH=/app/data/linkedin_storage.json with a volume so sessions survive redeploys
# Local manual login: set LINKEDIN_SESSION_UPLOAD_URL=https://<app>/internal/linkedin-session + INTERNAL_TRIGGER_TOKEN to auto-upload from linkedin_manual_login.py
# Optional: LINKEDIN_RECRUITER_SHEET_ENABLED=true — after classification, scrape LinkedIn recruiters into tab recruiters_info_{date} (or RECRUITERS_INFO_WORKSHEET)
# Optional: LINKEDIN_RECRUITER_MAX_URLS_PER_RUN=0 (0 = no cap; set e.g. 60 to limit per run)
# Optional: LINKEDIN_RECRUITER_FORCE_FAIL_TIMEOUT_S=15
# Optional: LINKEDIN_RECRUITER_RECYCLE_EVERY=25
# Optional: LINKEDIN_RECRUITER_RETRY_COUNT=3
# Optional: LINKEDIN_RECRUITER_RETRY_BASE_DELAY_S=1
# Optional: LINKEDIN_RECRUITER_LAUNCH_RETRY_COUNT=1 (retry whole recruiter scrape on Chromium launch crash)
# Optional: LINKEDIN_RECRUITER_LAUNCH_RETRY_DELAY_S=3
# Optional: LINKEDIN_RECRUITER_BETWEEN_JOBS_MIN_S=1.2 LINKEDIN_RECRUITER_BETWEEN_JOBS_MAX_S=3.8 — random pause before each job URL (after the first)
# Optional: LINKEDIN_RECRUITER_RECYCLE_EXTRA_MIN_S=1.5 LINKEDIN_RECRUITER_RECYCLE_EXTRA_MAX_S=4.0 — extra pause after browser recycle
# Optional: LINKEDIN_RECRUITER_HYDRATION_JITTER=0.18 — randomize post-load wait (fraction of base hydration wait)
# Optional: LINKEDIN_RECRUITER_MICRO_PAUSE_MAX_S=0.45 — max seconds for tiny random pause after navigation (before hydration)
# Optional: LINKEDIN_POSTS_PIPELINE_ENABLED=true — run LinkedIn-posts Apify pipeline in parallel with /internal/run-daily-jobs
# Optional: APIFY_LINKEDIN_POSTS_ACTOR_ID=buIWk2uOUzTmcLsuB
# Optional: APIFY_LINKEDIN_POST_QUERIES='["hiring data analyst Bangalore","hiring backend developer India"]'
# Optional: APIFY_LINKEDIN_POSTS_MAX_POSTS=30, APIFY_LINKEDIN_POSTS_POSTED_LIMIT=24h, APIFY_LINKEDIN_POSTS_SORT_BY=date
# Optional: AI_RELEVANCE_PROMPT_LINKEDIN_POSTS="..."
# Optional: COMPANY_CONTACTS_SHEET_NAME=company_contacts  (tab inside GOOGLE_SPREADSHEET_ID)
# Optional: COMPANY_CONTACTS_COMPANY_COLUMN=Name of company
# Optional: COMPANY_CONTACTS_EMAIL_COLUMN=Email Address
# Optional: OWNER_SHEET_NAME=owner_slack_ID
# Optional: INTERNAL_POC_TAG_SHEET_NAME=internal_poc_slack — tab in GOOGLE_SPREADSHEET_ID mapping owner_email (or email) + owner_slack_id for Case 2 Slack tags (no round-robin)
# Optional: LINKEDIN_POSTS_OWNER_HANDOVER=true — LinkedIn post Slack uses same owner round-robin + grouped blocks as job handover
# These contacts are used as fallback recruiter_email rows in recruiters_info_{date}
# Optional: HIRECAFE_ENABLED=false — disable HireCafe in daily scrape pipeline (default: enabled)
# Optional: HIRECAFE_SEARCH_URL — full hiring.cafe URL with encoded searchState (overrides default India + role keywords)
# Optional: HIRECAFE_MAX_SAMPLES=200 — max job payloads to capture per HireCafe run
# Optional: HIRECAFE_CLOUDFLARE_WAIT_SECONDS=10 — initial wait after page load
# Optional: HIRECAFE_CF_CLEAR_TIMEOUT_SECONDS=35 — max time to wait for Cloudflare challenge to clear
# Optional: HIRECAFE_POST_VERIFY_WAIT_SECONDS=8 — extra wait after challenge clears before scrolling
# Optional: HIRECAFE_CF_CLICK_X=544 and HIRECAFE_CF_CLICK_Y=334 — fallback click coordinates
# Optional: HIRECAFE_MIN_SCROLL_DELAY_SECONDS=0.7 and HIRECAFE_MAX_SCROLL_DELAY_SECONDS=1.8 — randomized scroll delay window
# Optional: HIRECAFE_SCROLL_PIXELS=1200
# Optional: HIRECAFE_MAX_RUNTIME_SECONDS=300
# Optional: HIRECAFE_MAX_IDLE_SECONDS=90
# Optional: HIRECAFE_MAX_SCROLLS=500
# Optional: HIRECAFE_HEARTBEAT_EVERY_SECONDS=15
# Optional: HIRECAFE_PRE_SCROLL_ESCAPE=true — send Escape once before Phase 1 scroll (dismiss modals / clear focus)
# Optional: HIRECAFE_BOTTOM_IDLE_SCROLLS=5 — consecutive scrolls with 0 new captures before declaring "at bottom"
# Optional: HIRECAFE_CAROUSEL_ENABLED=true — set to false to skip Phase 2 carousel expansion
# Optional: HIRECAFE_CAROUSEL_CLICK_DELAY=1.5 — seconds to wait after each carousel next click (slow = safer)
# Optional: HIRECAFE_GOOGLE_SPREADSHEET_ID — sheet for standalone /internal/run-hirecafe-scrape (falls back to GOOGLE_SPREADSHEET_ID)
# Optional: HIRECAFE_SCRAPED_TAB_TEMPLATE=hirecafe_scraped_jobs_{date}
# Optional: APP_LOG_LEVEL, Google/Slack keys used by services/pipeline.py, etc.
#
[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
